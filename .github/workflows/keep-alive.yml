name: Keep Backend Awake

on:
  schedule:
    # Runs every 10 minutes to prevent Render from sleeping
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend Health Endpoint
        run: curl -f -s https://xebia-lms-backend.onrender.com/api/health > /dev/null
