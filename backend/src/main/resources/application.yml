spring:
  profiles:
    active: dev
  application:
    name: lms-course-module
  datasource:
    url: jdbc:postgresql://localhost:5432/lms_course
    username: postgres
    password: ANAGHA2005
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
